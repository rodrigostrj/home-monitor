services:
  api:
    build:
      context: ./backend
      args:
        TARGETOS: linux
        TARGETARCH: arm64   # change to amd64 for x86 machines
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/data/home-monitor.db
      - PORT=8080
    volumes:
      - ./data:/data
    restart: unless-stopped

